<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشغل الاحترافي الذكي</title>
    <style>
        body {
            background: linear-gradient(135deg, rgba(15,15,15,0.95), rgba(30,30,30,0.9)), url('back.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
        }
        .video-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 0.5px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
        }
        .player-container {
            position: relative;
            width: 92%;
            max-width: 850px;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0,0,0,0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: cursor 0.3s ease;
        }
        /* إخفاء الماوس عند اختفاء عناصر التحكم */
        .player-container.hide-controls {
            cursor: none;
        }
        .iframe-wrapper {
            position: absolute;
            top: -14%;
            left: 0;
            width: 100%;
            height: 128%;
            pointer-events: none;
        }
        #youtube-player {
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 10;
            cursor: pointer;
        }
        /* تصميم شريط التحكم الزجاجي الاحترافي */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background: linear-gradient(transparent, rgba(10,10,10,0.95));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            box-sizing: border-box;
            z-index: 20;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 1;
            transform: translateY(0);
        }
        /* حالة الاختفاء التدريجي النقي */
        .player-container.hide-controls .custom-controls {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }
        .controls-right, .controls-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .control-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .control-btn:hover {
            background: #00adb5;
            box-shadow: 0 0 12px rgba(0, 173, 181, 0.4);
        }
        /* تحديث وتطوير شريط الفيديو الاحترافي */
        .progress-container {
            flex-grow: 1;
            margin: 0 25px;
            display: flex;
            align-items: center;
            position: relative;
            cursor: pointer;
            height: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            position: relative;
            transition: height 0.2s ease;
        }
        .progress-container:hover .progress-bar {
            height: 6px; /* يتمدد عند التمرير */
        }
        .progress-filled {
            height: 100%;
            background: #00adb5;
            width: 0%;
            border-radius: 10px;
            position: relative;
        }
        /* المؤشر الدائري المتطور */
        .progress-filled::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
        }
        .progress-container:hover .progress-filled::after {
            transform: translateY(-50%) scale(1); /* يظهر فقط عند الحوسة */
        }
    </style>
</head>
<body>

<div class="video-title">إيه سبب انفصالي عن تريبلز !</div>

<div class="player-container" id="main-player-container" oncontextmenu="return false;">
    <div class="video-overlay" id="vid-mask"></div>
    <div class="iframe-wrapper">
        <div id="youtube-player"></div>
    </div>
    <div class="custom-controls" id="controls-panel">
        <div class="controls-right">
            <button class="control-btn" id="play-pause-btn">تشغيل</button>
            <button class="control-btn" id="mute-btn">كتم الصوت</button>
        </div>
        <div class="progress-container" id="progress-timeline">
            <div class="progress-bar">
                <div class="progress-filled" id="progress-current"></div>
            </div>
        </div>
        <div class="controls-left">
            <button class="control-btn" id="fullscreen-btn">ملء الشاشة ⛶</button>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="secure-player.js"></script>

</body>
</html>
